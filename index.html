<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#EFEEF3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="Stations Vélib les plus proches en temps réel">
  <title>Vébile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header id="app-header">
    <img src="assets/logo.png" alt="Vébile" id="logo" width="186" height="54">
  </header>

  <!-- ── Barre de localisation ───────────────────────────────────────────── -->
  <div id="location-bar">
    <div class="location-field">
      <!-- Zone de tap pleine largeur (ouvre la modale) -->
      <button id="btn-location-open" class="location-tap-area" aria-label="Changer de localisation"></button>
      <!-- Icône pin -->
      <svg class="location-ico" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7z" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="1.8"/>
      </svg>
      <!-- Adresse courante -->
      <span id="location-text" class="location-text">Chargement…</span>
      <!-- Bouton refresh (à gauche du chevron) -->
      <button id="btn-refresh" class="btn-loc-refresh" aria-label="Actualiser ma position">
        <svg width="15" height="15" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <g clip-path="url(#clip-loc)">
            <path d="M21 12H27V6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M27 12L23.465 8.465C21.4178 6.41787 18.6461 5.26035 15.751 5.2435C12.8559 5.22665 10.0709 6.35183 8 8.375" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M11 20H5V26" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5 20L8.535 23.535C10.5822 25.5821 13.3539 26.7396 16.249 26.7565C19.1441 26.7733 21.9291 25.6482 24 23.625" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
          <defs><clipPath id="clip-loc"><rect width="32" height="32" fill="white"/></clipPath></defs>
        </svg>
      </button>
      <!-- Chevron -->
      <svg class="location-ico location-ico--chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <!-- ── Conteneur liste ─────────────────────────────────────────────────── -->
  <main id="station-container">

    <!-- Géolocalisation refusée -->
    <div id="screen-geo-denied" class="screen" hidden>
      <img src="assets/logo.png" alt="" class="screen-logo" aria-hidden="true">
      <h2>Position requise</h2>
      <p>Vébile utilise votre position GPS pour trouver les stations Vélib les plus proches.</p>
      <button id="btn-retry-geo" class="btn-primary">Activer la géolocalisation</button>
    </div>

    <!-- Erreur réseau -->
    <div id="screen-error" class="screen" hidden>
      <img src="assets/logo.png" alt="" class="screen-logo faded" aria-hidden="true">
      <h2>Connexion impossible</h2>
      <p id="error-message">Impossible de charger les stations Vélib.</p>
    </div>

    <!-- Liste des stations -->
    <div id="station-list" role="list" aria-label="Stations Vélib proches"></div>

    <!-- Loader infinite scroll -->
    <div id="scroll-loader" hidden>
      <span></span><span></span><span></span>
    </div>

  </main>

  <!-- ── Modale de recherche ─────────────────────────────────────────────── -->
  <div id="search-modal" role="dialog" aria-modal="true" aria-label="Rechercher une adresse">

    <!-- Bloc fixe (ne scroll pas, reste visible quand le clavier s'ouvre) -->
    <div class="modal-fixed">
      <div class="modal-header">
        <!-- CTA-back extrait de Figma : fond #EFEEF3, rx=12, flèche noire -->
        <button id="btn-modal-back" class="modal-back" aria-label="Retour">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
            <path d="M12.2197 14.2197C12.5126 13.9268 12.9874 13.9268 13.2803 14.2197C13.5731 14.5126 13.5732 14.9873 13.2803 15.2802L9.56055 18.9999H32.75C33.1642 18.9999 33.5 19.3357 33.5 19.7499C33.5 20.1641 33.1642 20.4999 32.75 20.4999H9.56055L13.2803 24.2197C13.5731 24.5126 13.5732 24.9873 13.2803 25.2802C12.9874 25.5731 12.5126 25.5731 12.2197 25.2802L7.21973 20.2802C7.18771 20.2482 7.15978 20.2136 7.13477 20.1777C7.10404 20.1336 7.07743 20.0864 7.05664 20.0361C7.03591 19.9858 7.02105 19.9337 7.01172 19.8808C7.00423 19.8383 7 19.7946 7 19.7499C7 19.7046 7.00402 19.6602 7.01172 19.6171C7.02081 19.5663 7.03505 19.5162 7.05469 19.4677L7.05859 19.458C7.07018 19.4306 7.08596 19.4054 7.10059 19.3798C7.13303 19.323 7.17122 19.2682 7.21973 19.2197L12.2197 14.2197Z" fill="black"/>
          </svg>
        </button>
        <input id="search-input" class="search-input" type="search"
          placeholder="Rechercher une adresse…"
          autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
      <button id="btn-use-gps" class="btn-use-gps">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        Utiliser ma position
      </button>
    </div>

    <!-- Zone scrollable : suggestions uniquement -->
    <div id="search-results" role="listbox" aria-label="Suggestions"></div>

  </div>

  <!-- ── Barre de navigation basse ──────────────────────────────────────── -->
  <footer id="bottom-bar">
    <div id="tabbar" role="tablist">
      <div id="tab-pill" aria-hidden="true"></div>
      <button id="tab-borrow" class="tab-item is-active" role="tab" aria-selected="true">
        <!-- icon-32-bike extrait de Figma (node 45:735), fill → currentColor -->
        <svg width="20" height="20" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <path d="M7 26C5.29867 26 3.87333 25.4253 2.724 24.276C1.57467 23.1267 1 21.7013 1 20C1 18.3333 1.58578 16.908 2.75733 15.724C3.92889 14.54 5.34311 13.9484 7 13.9493C8.52356 13.9493 9.85556 14.4649 10.996 15.496C12.1373 16.5262 12.7951 17.8053 12.9693 19.3333H15.3227L12.4613 11.3333H10.3333V10H15.6667V11.3333H13.8933L14.8213 13.9493H22.708L20.4667 7.79467C20.4151 7.64089 20.3298 7.52533 20.2107 7.448C20.0907 7.37156 19.9538 7.33333 19.8 7.33333H17V6H19.8C20.224 6 20.6124 6.11733 20.9653 6.352C21.3182 6.58578 21.5693 6.90933 21.7187 7.32267L24.1387 13.9333H25.6667C27.3236 13.9333 28.7378 14.5191 29.9093 15.6907C31.0809 16.8622 31.6667 18.2764 31.6667 19.9333C31.6667 21.5956 31.0822 23.0133 29.9133 24.1867C28.7436 25.3618 27.328 25.9493 25.6667 25.9493C24.1351 25.9493 22.8107 25.4449 21.6933 24.436C20.576 23.4271 19.9107 22.1707 19.6973 20.6667H12.9693C12.7951 22.2 12.1293 23.4724 10.972 24.484C9.81467 25.4956 8.49067 26.0009 7 26ZM7 24.6667C8.11644 24.6667 9.10089 24.3142 9.95333 23.6093C10.8049 22.9036 11.3556 21.9227 11.6053 20.6667H7.66667V19.3333H11.6053C11.3556 18.0711 10.8044 17.0889 9.952 16.3867C9.10044 15.6844 8.11644 15.3333 7 15.3333C5.67822 15.3333 4.57022 15.7809 3.676 16.676C2.78178 17.5711 2.33422 18.6791 2.33333 20C2.33333 21.2818 2.78089 22.38 3.676 23.2947C4.57111 24.2093 5.67911 24.6667 7 24.6667ZM16.8053 19.3333H19.6973C19.7747 18.72 20.0013 17.9987 20.3773 17.1693C20.7551 16.34 21.3044 15.7107 22.0253 15.2813H15.292L16.8053 19.3333ZM25.6667 24.6667C26.9884 24.6667 28.0964 24.2093 28.9907 23.2947C29.8858 22.38 30.3333 21.2818 30.3333 20C30.3333 18.6782 29.8858 17.5702 28.9907 16.676C28.0956 15.7818 26.9876 15.3342 25.6667 15.3333C25.4684 15.3333 25.2836 15.3378 25.112 15.3467C24.9404 15.3556 24.7733 15.3853 24.6107 15.436L25.9947 19.1227L24.744 19.5947L23.4253 15.908C22.6564 16.3373 22.06 16.9271 21.636 17.6773C21.212 18.4276 21 19.2018 21 20C21 21.2818 21.4476 22.38 22.3427 23.2947C23.2378 24.2093 24.3458 24.6667 25.6667 24.6667Z" fill="currentColor"/>
        </svg>
        <span>Emprunter</span>
      </button>
      <button id="tab-return" class="tab-item" role="tab" aria-selected="false">
        <!-- icon-32-borne extrait de Figma (node 45:747), fill → currentColor -->
        <svg width="20" height="20" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M18.5 2C18.6989 2 18.8896 2.07907 19.0303 2.21973L24.2803 7.46973C24.4209 7.61038 24.5 7.80109 24.5 8V13.75C24.5 14.1642 24.1642 14.5 23.75 14.5H22.5V29H26.75C27.1642 29 27.5 29.3358 27.5 29.75C27.5 30.1642 27.1642 30.5 26.75 30.5H6.75C6.33579 30.5 6 30.1642 6 29.75C6 29.3358 6.33579 29 6.75 29H11V14.5H9.75C9.33579 14.5 9 14.1642 9 13.75V2.75C9 2.33579 9.33579 2 9.75 2H18.5ZM12.5 29H17V14.5H12.5V29ZM18.5 29H21V14.5H18.5V29ZM10.5 13H23V8.31055L18.1895 3.5H10.5V13Z" fill="currentColor"/>
        </svg>
        <span>Déposer</span>
      </button>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
